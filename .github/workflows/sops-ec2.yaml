name: Deploy to VPS (Nginx + SOPS)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      # - run: npm run build

      # Upload project ke VPS
      - name: Upload files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/var/www/"

      # Execute deployment script
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/

            echo "🔹 Install dependencies"
            npm install

            echo "🔹 Setup SOPS"
            if ! command -v sops &> /dev/null; then
              curl -LO https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64
              mv sops-v3.12.2.linux.amd64 sops
              chmod +x sops
            fi

            echo "🔹 Setup AGE key"
            echo "${{ secrets.SOPS_AGE_KEY }}" > key.txt
            chmod 600 key.txt

            echo "🔹 Decrypt env"
            export SOPS_AGE_KEY_FILE=key.txt
            ./sops -d secrets.enc.yaml > .env

            echo "🔹 Restart app"
            pm2 restart app || pm2 start app.js --name app

            echo "🔹 Cleanup"
            rm -f key.txt
